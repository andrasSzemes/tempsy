version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Check if frontend has changed
        - |
          if [ "$AWS_COMMIT_ID" != "" ]; then
            CHANGED_FILES=$(git diff --name-only HEAD^ HEAD)
            if echo "$CHANGED_FILES" | grep -q "^frontend/"; then
              echo "Frontend changes detected, continuing build..."
            else
              echo "No frontend changes, skipping build"
              exit 0
            fi
          fi
        - cd frontend
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: frontend/dist
    files:
      - '**/*'
  cache:
    paths:
      - frontend/.npm/**/*
      - frontend/node_modules/**/*
