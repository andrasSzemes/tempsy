version: 1.0
runtime: nodejs22
build:
  commands:
    pre-build:
      - npm ci --cache .npm --prefer-offline
    build:
      - npm run build
    post-build:
      - echo "Build completed successfully"

run:
  command: npm start
  network:
    port: 3000
    env: APP_PORT
  env:
    - name: NODE_ENV
      value: production
    - name: PORT
      value: "3000"
    - name: DATABASE_URL
      value-from: "arn:aws:secretsmanager:eu-central-1:150017970635:secret:tempsy/database-url-D0FtN7"
