version: 1.0
runtime: nodejs18
build:
  commands:
    pre-build:
      - npm ci --cache .npm --prefer-offline
    build:
      - npm run build
    post-build:
      - echo "Build completed successfully"

run:
  runtime-version: 18
  command: npm start
  network:
    port: 3000
    env: APP_PORT
  env:
    - name: NODE_ENV
      value: production
    - name: PORT
      value: "3000"
